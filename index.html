<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ian Ryu</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="shorcut icon" type="image/png" href="img/drawing-compass.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <header id="header">
      <div class="logo">
        <span>ian ryu</span>
      </div>
      <div class="header-actions">
        <button id="btn-export" class="header-btn" title="Export as PNG">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>
    </header>

    <div id="toolbar">
      <button class="tool-btn" id="tool-pan" data-tool="pan" title="Pan (H)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>
      </button>
      <button class="tool-btn active" id="tool-select" data-tool="select" title="Select (V)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="m13 13 6 6"/></svg>
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="tool-rect" data-tool="rect" title="Rectangle (R)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      </button>
      <button class="tool-btn" id="tool-ellipse" data-tool="ellipse" title="Ellipse (E)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="12" rx="10" ry="6"/></svg>
      </button>
      <button class="tool-btn" id="tool-line" data-tool="line" title="Line (L)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
      </button>
      <button class="tool-btn" id="tool-arrow" data-tool="arrow" title="Arrow (A)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="9 5 19 5 19 15"/></svg>
      </button>
      <button class="tool-btn" id="tool-pen" data-tool="pen" title="Pen (P)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
      </button>
      <button class="tool-btn" id="tool-text" data-tool="text" title="Text (T)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="tool-eraser" data-tool="eraser" title="Eraser (X)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
      </button>
    </div>

    <div id="style-panel">
      <div class="panel-section">
        <div class="panel-label">Stroke</div>
        <div class="color-grid" id="color-grid">
          <div class="color-swatch active" data-color="#1a1a1a" style="background:#1a1a1a;" title="Black"></div>
          <div class="color-swatch" data-color="#ffffff" style="background:#fff;border:1.5px solid #ddd;" title="White"></div>
          <div class="color-swatch" data-color="#e24b4a" style="background:#e24b4a;" title="Red"></div>
          <div class="color-swatch" data-color="#185fa5" style="background:#185fa5;" title="Blue"></div>
          <div class="color-swatch" data-color="#3b6d11" style="background:#3b6d11;" title="Green"></div>
          <div class="color-swatch" data-color="#ba7517" style="background:#ba7517;" title="Amber"></div>
          <div class="color-swatch" data-color="#993556" style="background:#993556;" title="Pink"></div>
          <div class="color-swatch" data-color="#534ab7" style="background:#534ab7;" title="Purple"></div>
        </div>
        <input type="color" id="custom-color" value="#1a1a1a" title="Custom color" />
      </div>
      <div class="panel-section">
        <div class="panel-label">Size</div>
        <div class="size-row">
          <button class="size-btn active" data-size="2">S</button>
          <button class="size-btn" data-size="4">M</button>
          <button class="size-btn" data-size="8">L</button>
          <button class="size-btn" data-size="14">XL</button>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-label">Opacity</div>
        <input type="range" id="opacity-slider" min="10" max="100" value="100" step="5" />
        <span id="opacity-label" class="range-label">100%</span>
      </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="bottom-bar">
        <button class="ctrl-btn" id="btn-undo" title="Undo (Ctrl+Z)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-redo" title="Redo (Ctrl+Y)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
        </button>
        <a href="https://github.com/frndcrbn/" target="_blank" rel="noopener noreferrer" class="github-link" title="frndcrbn on Github">
            <svg width="25" height="25" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
                frndcrbn
            </svg>
        </a>
        <div class="zoom-controls">
            <button class="ctrl-btn" id="zoom-out">−</button>
            <span id="zoom-label">100%</span>
            <button class="ctrl-btn" id="zoom-in">+</button>
            <button class="ctrl-btn" id="zoom-fit" title="Fit to screen">⊡</button>
        </div>      
        <button class="ctrl-btn danger" id="btn-clear" title="Clear canvas">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
    </div>

    <textarea id="text-input" placeholder="Type here… (Enter to place, Esc to cancel)"></textarea>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
